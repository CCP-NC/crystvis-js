<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title></title>
    <link rel="stylesheet" href="demo.css">

    <script src="demo.js" type="text/javascript" charset="utf-8" async defer></script>
</head>
<body>
    
    <div style="width: 100%; height: 100%">

        <div style="float: left" id="main-app">
            Loading...
        </div>

        <div id="error-banner" style="display:none"></div>

        <div style="float: right; width: 30%">
            <table>
                   <caption>Input controls</caption>
                   <tbody>
                       <tr>
                           <td>            
                                <input id="file-load" type="file" value="Load file">
                           </td>
                           <td>
                                Supercell: 
                               <input id="scell-x" type="text" size="3">
                               <input id="scell-y" type="text" size="3">
                               <input id="scell-z" type="text" size="3">
                           </td>
                       </tr>
                       <tr>
                           <td>
                               <input type="button" name="" value="Load file" onclick="loadFile()">
                           </td>
                           <td>
                             <input id="molcryst-check" type="checkbox" name="" value="" placeholder="">Load as molecular crystal
                           </td>
                       </tr>
                       <tr>
                            <td>
                                <input type="button" name="" value="Show unit cell" onclick="changeDisplayed({'cell': [[0,0,0]]})">
                            </td>
                            <td>
                                <input type="button" name="" value="Show 5 Ang sphere" onclick="changeDisplayed({'sphere': [[0,0,0], 5.0]})">
                            </td>
                       </tr>
                        <tr>
                            <td colspan="" rowspan="" headers="">
                                <input id="label-check" type="checkbox" name="" value="false" onchange="changeLabels()">Show labels
                            </td>
                            <td colspan="" rowspan="" headers="">
                                <input id="ellipsoid-check" type="checkbox" name="" value="false" onchange="changeEllipsoids()">Show ellipsoids
                            </td>
                        </tr>
                        <tr>
                          <td>
                            <input id="isosurf-check" type="checkbox" name="" value="false" onchange="changeIsosurface()">Show isosurface
                          </td>
                          <td>
                              <input type="text" id="vdw-f" size="5" value="1.0"> Van der Waals scaling
                          </td>
                        </tr>
                        <tr>
                            <td>
                                <!-- message to display -- input -->
                                <input id="message" type="text" name="" value="Hello world!">
                            </td>
                            <td>
                                <!-- button to display message -->
                                <input type="button" name="" value="Display message" onclick="displayMessage()">
                                <!-- button to clear message -->
                                <input type="button" name="" value="Clear messages" onclick="clearMessages()">

                            </td>
                            
                        </tr>
                        <tr>
                            <td colspan="2"><hr style="margin:6px 0"><strong>Camera state</strong></td>
                        </tr>
                        <tr>
                            <td>
                                <input type="button" value="Save view" onclick="saveCamera()">
                                <input type="button" value="Restore view" onclick="restoreCamera()">
                            </td>
                            <td>
                                <input type="button" value="Copy JSON" onclick="copyCameraJSON()">
                                <input type="button" value="Apply JSON" onclick="applyPastedJSON()">
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2">
                                <textarea id="camera-json" rows="5" style="width:100%;font-family:monospace;font-size:11px;box-sizing:border-box" placeholder="Camera state will appear here…" spellcheck="false"></textarea>
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2" id="camera-status" style="font-size:11px;color:#555"></td>
                        </tr>
                   </tbody>
           </table> 
           <div id='colorgrid'>
               
           </div>
        </div>

    </div>

</body>
</html>
